<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" width="1284" height="2778">
  <!-- Splash screen: 白背景にロゴを中央配置 -->
  <rect width="1284" height="2778" fill="#FFFFFF"/>

  <!-- ロゴを中央に配置 (460x190 → 拡大2.2倍 = 1012x418, 中央寄せ) -->
  <g transform="translate(136, 1180) scale(2.2)">
    <defs>
      <clipPath id="a-clip">
        <rect x="0" y="0" width="460" height="127"/>
        <rect x="0" y="145" width="460" height="45"/>
      </clipPath>
    </defs>

    <!-- A lettermark -->
    <g clip-path="url(#a-clip)">
      <polygon points="100,10 48,178 66,178 100,70 134,178 152,178" fill="rgb(217,119,6)" opacity="0.12" transform="translate(-9, 0)"/>
      <polygon points="100,10 48,178 66,178 100,70 134,178 152,178" fill="rgb(217,119,6)" opacity="0.25" transform="translate(-4.5, 0)"/>
      <polygon points="100,10 48,178 66,178 100,70" fill="rgb(217,119,6)"/>
      <polygon points="100,10 134,178 152,178 100,70" fill="rgb(217,119,6)"/>
    </g>

    <!-- パルスライン -->
    <polyline points="18,136 46,136 78,136 86,116 94,146 102,110 110,140 116,126 142,136 392,136 400,116 408,146 416,110 424,140 430,126 450,136" fill="none" stroke="rgb(217,119,6)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="18,136 46,136 78,136 86,116 94,146 102,110 110,140 116,126 142,136 392,136 400,116 408,146 416,110 424,140 430,126 450,136" fill="none" stroke="rgb(217,119,6)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>
    <circle cx="102" cy="110" r="2" fill="rgb(217,119,6)"/>
    <circle cx="102" cy="110" r="4" fill="rgb(217,119,6)" opacity="0.25"/>
    <circle cx="416" cy="110" r="2" fill="rgb(217,119,6)"/>
    <circle cx="416" cy="110" r="4" fill="rgb(217,119,6)" opacity="0.25"/>

    <!-- ctiko モーショントレイル -->
    <g opacity="0.12" transform="translate(-9, 0)" fill="rgb(217,119,6)">
      <rect x="160" y="54" width="16" height="80"/><rect x="160" y="54" width="44" height="16"/><rect x="160" y="118" width="44" height="16"/>
      <rect x="224" y="30" width="16" height="104"/><rect x="212" y="54" width="36" height="16"/>
      <rect x="256" y="54" width="16" height="80"/><rect x="256" y="28" width="16" height="16"/>
      <rect x="282" y="54" width="16" height="80"/><polygon points="298,86 298,102 328,68 328,54"/><polygon points="298,86 298,102 328,118 328,134"/>
      <path d="M338,54 h48 v80 h-48 z M354,70 h16 v48 h-16 z" fill-rule="evenodd"/>
    </g>
    <g opacity="0.25" transform="translate(-4.5, 0)" fill="rgb(217,119,6)">
      <rect x="160" y="54" width="16" height="80"/><rect x="160" y="54" width="44" height="16"/><rect x="160" y="118" width="44" height="16"/>
      <rect x="224" y="30" width="16" height="104"/><rect x="212" y="54" width="36" height="16"/>
      <rect x="256" y="54" width="16" height="80"/><rect x="256" y="28" width="16" height="16"/>
      <rect x="282" y="54" width="16" height="80"/><polygon points="298,86 298,102 328,68 328,54"/><polygon points="298,86 298,102 328,118 328,134"/>
      <path d="M338,54 h48 v80 h-48 z M354,70 h16 v48 h-16 z" fill-rule="evenodd"/>
    </g>

    <!-- ctiko 本体 -->
    <g fill="rgb(217,119,6)">
      <rect x="160" y="54" width="16" height="80"/><rect x="160" y="54" width="44" height="16"/><rect x="160" y="118" width="44" height="16"/>
      <rect x="224" y="30" width="16" height="104"/><rect x="212" y="54" width="36" height="16"/>
      <rect x="256" y="54" width="16" height="80"/><rect x="256" y="28" width="16" height="16"/>
      <rect x="282" y="54" width="16" height="80"/><polygon points="298,86 298,102 328,68 328,54"/><polygon points="298,86 298,102 328,118 328,134"/>
      <path d="M338,54 h48 v80 h-48 z M354,70 h16 v48 h-16 z" fill-rule="evenodd"/>
    </g>
  </g>
</svg>