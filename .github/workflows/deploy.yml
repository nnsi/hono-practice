name: Deploy Cloudflare

on:
  push:
    branches:
      - master
      - release

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Get changed files (backend)
        id: changed_backend
        uses: tj-actions/changed-files@716b1e13042866565e00e85fd4ec490e186c4a2f # v41
        with:
          files: |
            apps/backend/**
            wrangler.toml

      - name: Get changed files (frontend)
        id: changed_frontend
        uses: tj-actions/changed-files@716b1e13042866565e00e85fd4ec490e186c4a2f # v41
        with:
          files: |
            apps/frontend/**

      - name: Get changed files (admin-frontend)
        id: changed_admin_frontend
        uses: tj-actions/changed-files@716b1e13042866565e00e85fd4ec490e186c4a2f # v41
        with:
          files: |
            apps/admin-frontend/**

      - name: Get changed files (db migrations)
        id: changed_db_migrations
        uses: tj-actions/changed-files@716b1e13042866565e00e85fd4ec490e186c4a2f # v41
        with:
          files: |
            infra/drizzle/**

      - name: Use Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: test
        run: pnpm run ci-check
        env:
          CI: true
          NODE_ENV: test

      # --- frontend ---
      - name: Build frontend (stg)
        if: github.ref_name == 'master' && steps.changed_frontend.outputs.any_changed == 'true'
        run: pnpm run build-client-stg
        env:
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID_STG }}
          VITE_APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL_STG }}
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL }}
          VITE_ADMINISTRATOR_NAME: ${{ secrets.VITE_ADMINISTRATOR_NAME }}
          VITE_ENABLE_WEB_SUBSCRIPTION: ${{ vars.VITE_ENABLE_WEB_SUBSCRIPTION_STG }}

      - name: Build frontend (release)
        if: github.ref_name == 'release' && steps.changed_frontend.outputs.any_changed == 'true'
        run: pnpm run build-client
        env:
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID_PROD }}
          VITE_APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL_PROD }}
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL }}
          VITE_ADMINISTRATOR_NAME: ${{ secrets.VITE_ADMINISTRATOR_NAME }}
          VITE_ENABLE_WEB_SUBSCRIPTION: ${{ vars.VITE_ENABLE_WEB_SUBSCRIPTION_PROD }}

      # --- admin-frontend ---
      - name: Build admin-frontend (stg)
        if: github.ref_name == 'master' && steps.changed_admin_frontend.outputs.any_changed == 'true'
        run: pnpm run build-admin-stg
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL_STG }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID_STG }}

      - name: Build admin-frontend (release)
        if: github.ref_name == 'release' && steps.changed_admin_frontend.outputs.any_changed == 'true'
        run: pnpm run build-admin
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL_PROD }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID_PROD }}

      # --- DB migrations ---
      - name: Migrate Neon DB (stg)
        if: github.ref_name == 'master' && steps.changed_db_migrations.outputs.any_changed == 'true'
        run: pnpm run db-migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STG }}

      - name: Migrate Neon DB (prod)
        if: github.ref_name == 'release' && steps.changed_db_migrations.outputs.any_changed == 'true'
        run: pnpm run db-migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      # --- backend secrets & deploy ---
      - name: Configure Hyperdrive and R2 for staging
        if: github.ref_name == 'master' && steps.changed_backend.outputs.any_changed == 'true'
        run: |
          cat << EOF >> wrangler.toml

          [env.stg]
          [[env.stg.hyperdrive]]
          binding = "HYPERDRIVE"
          id = "${HYPERDRIVE_ID}"

          [[env.stg.r2_buckets]]
          binding = "R2_BUCKET"
          bucket_name = "${R2_BUCKET_NAME}"

          [[env.stg.kv_namespaces]]
          binding = "RATE_LIMIT_KV_NS"
          id = "${KV_RATE_LIMIT_ID}"
          EOF
        env:
          HYPERDRIVE_ID: ${{ secrets.HYPERDRIVE_ID_STG }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME_STG }}
          KV_RATE_LIMIT_ID: ${{ secrets.KV_RATE_LIMIT_ID_STG }}

      - name: Configure Hyperdrive and R2 for production
        if: github.ref_name == 'release' && steps.changed_backend.outputs.any_changed == 'true'
        run: |
          cat << EOF >> wrangler.toml

          [env.production]
          [[env.production.hyperdrive]]
          binding = "HYPERDRIVE"
          id = "${HYPERDRIVE_ID}"

          [[env.production.r2_buckets]]
          binding = "R2_BUCKET"
          bucket_name = "${R2_BUCKET_NAME}"

          [[env.production.kv_namespaces]]
          binding = "RATE_LIMIT_KV_NS"
          id = "${KV_RATE_LIMIT_ID}"
          EOF
        env:
          HYPERDRIVE_ID: ${{ secrets.HYPERDRIVE_ID_PROD }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME_PROD }}
          KV_RATE_LIMIT_ID: ${{ secrets.KV_RATE_LIMIT_ID_PROD }}

      - name: Set DATABASE_URL secret in Cloudflare (stg)
        if: github.ref_name == 'master' && steps.changed_backend.outputs.any_changed == 'true'
        run: |
          printf '%s' "$DATABASE_URL" | pnpm exec wrangler secret put DATABASE_URL --env stg
          printf '%s' "$JWT_SECRET" | pnpm exec wrangler secret put JWT_SECRET --env stg
          printf '%s' "$APP_URL" | pnpm exec wrangler secret put APP_URL --env stg
          printf '%s' "$R2_PUBLIC_URL" | pnpm exec wrangler secret put R2_PUBLIC_URL --env stg
          printf '%s' "$GOOGLE_OAUTH_CLIENT_ID" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_ID --env stg
          if [ -n "$GOOGLE_OAUTH_CLIENT_ID_ANDROID" ]; then printf '%s' "$GOOGLE_OAUTH_CLIENT_ID_ANDROID" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_ID_ANDROID --env stg; fi
          if [ -n "$GOOGLE_OAUTH_CLIENT_ID_IOS" ]; then printf '%s' "$GOOGLE_OAUTH_CLIENT_ID_IOS" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_ID_IOS --env stg; fi
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then printf '%s' "$GOOGLE_OAUTH_CLIENT_SECRET" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_SECRET --env stg; fi
          if [ -n "$APPLE_CLIENT_ID" ]; then printf '%s' "$APPLE_CLIENT_ID" | pnpm exec wrangler secret put APPLE_CLIENT_ID --env stg; fi
          if [ -n "$APPLE_BUNDLE_ID" ]; then printf '%s' "$APPLE_BUNDLE_ID" | pnpm exec wrangler secret put APPLE_BUNDLE_ID --env stg; fi
          if [ -n "$APPLE_TEAM_ID" ]; then printf '%s' "$APPLE_TEAM_ID" | pnpm exec wrangler secret put APPLE_TEAM_ID --env stg; fi
          if [ -n "$APPLE_KEY_ID" ]; then printf '%s' "$APPLE_KEY_ID" | pnpm exec wrangler secret put APPLE_KEY_ID --env stg; fi
          if [ -n "$APPLE_PRIVATE_KEY" ]; then printf '%s' "$APPLE_PRIVATE_KEY" | pnpm exec wrangler secret put APPLE_PRIVATE_KEY --env stg; fi
          printf '%s' "$APP_URL_V2" | pnpm exec wrangler secret put APP_URL_V2 --env stg
          if [ -n "$OPENROUTER_API_KEY" ]; then printf '%s' "$OPENROUTER_API_KEY" | pnpm exec wrangler secret put OPENROUTER_API_KEY --env stg; fi
          printf '%s' "$ADMIN_ALLOWED_EMAILS" | pnpm exec wrangler secret put ADMIN_ALLOWED_EMAILS --env stg
          printf '%s' "$CF_WORKERS_TOKEN" | pnpm exec wrangler secret put CF_WORKERS_TOKEN --env stg
          printf '%s' "$CF_ACCOUNT_ID" | pnpm exec wrangler secret put CF_ACCOUNT_ID --env stg
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKERS_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_STG }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_STG }}
          APP_URL: ${{ vars.APP_URL_STG }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL_STG }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID_STG }}
          ADMIN_ALLOWED_EMAILS: ${{ vars.VITE_CONTACT_EMAIL }}
          GOOGLE_OAUTH_CLIENT_ID_ANDROID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }}
          GOOGLE_OAUTH_CLIENT_ID_IOS: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_IOS }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_SECRET_STG }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
          APP_URL_V2: ${{ vars.APP_URL_V2_STG }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Set DATABASE_URL secret in Cloudflare (prod)
        if: github.ref_name == 'release' && steps.changed_backend.outputs.any_changed == 'true'
        run: |
          printf '%s' "$DATABASE_URL" | pnpm exec wrangler secret put DATABASE_URL --env production
          printf '%s' "$JWT_SECRET" | pnpm exec wrangler secret put JWT_SECRET --env production
          printf '%s' "$APP_URL" | pnpm exec wrangler secret put APP_URL --env production
          printf '%s' "$R2_PUBLIC_URL" | pnpm exec wrangler secret put R2_PUBLIC_URL --env production
          printf '%s' "$GOOGLE_OAUTH_CLIENT_ID" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_ID --env production
          if [ -n "$GOOGLE_OAUTH_CLIENT_ID_ANDROID" ]; then printf '%s' "$GOOGLE_OAUTH_CLIENT_ID_ANDROID" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_ID_ANDROID --env production; fi
          if [ -n "$GOOGLE_OAUTH_CLIENT_ID_IOS" ]; then printf '%s' "$GOOGLE_OAUTH_CLIENT_ID_IOS" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_ID_IOS --env production; fi
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then printf '%s' "$GOOGLE_OAUTH_CLIENT_SECRET" | pnpm exec wrangler secret put GOOGLE_OAUTH_CLIENT_SECRET --env production; fi
          if [ -n "$APPLE_CLIENT_ID" ]; then printf '%s' "$APPLE_CLIENT_ID" | pnpm exec wrangler secret put APPLE_CLIENT_ID --env production; fi
          if [ -n "$APPLE_BUNDLE_ID" ]; then printf '%s' "$APPLE_BUNDLE_ID" | pnpm exec wrangler secret put APPLE_BUNDLE_ID --env production; fi
          if [ -n "$APPLE_TEAM_ID" ]; then printf '%s' "$APPLE_TEAM_ID" | pnpm exec wrangler secret put APPLE_TEAM_ID --env production; fi
          if [ -n "$APPLE_KEY_ID" ]; then printf '%s' "$APPLE_KEY_ID" | pnpm exec wrangler secret put APPLE_KEY_ID --env production; fi
          if [ -n "$APPLE_PRIVATE_KEY" ]; then printf '%s' "$APPLE_PRIVATE_KEY" | pnpm exec wrangler secret put APPLE_PRIVATE_KEY --env production; fi
          printf '%s' "$APP_URL_V2" | pnpm exec wrangler secret put APP_URL_V2 --env production
          if [ -n "$OPENROUTER_API_KEY" ]; then printf '%s' "$OPENROUTER_API_KEY" | pnpm exec wrangler secret put OPENROUTER_API_KEY --env production; fi
          printf '%s' "$ADMIN_ALLOWED_EMAILS" | pnpm exec wrangler secret put ADMIN_ALLOWED_EMAILS --env production
          printf '%s' "$CF_WORKERS_TOKEN" | pnpm exec wrangler secret put CF_WORKERS_TOKEN --env production
          printf '%s' "$CF_ACCOUNT_ID" | pnpm exec wrangler secret put CF_ACCOUNT_ID --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKERS_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_PROD }}
          APP_URL: ${{ vars.APP_URL_PROD }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL_PROD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID_PROD }}
          ADMIN_ALLOWED_EMAILS: ${{ vars.VITE_CONTACT_EMAIL }}
          GOOGLE_OAUTH_CLIENT_ID_ANDROID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }}
          GOOGLE_OAUTH_CLIENT_ID_IOS: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID_IOS }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_SECRET_PROD }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
          APP_URL_V2: ${{ vars.APP_URL_V2_PROD }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Deploy to Cloudflare Workers (stg)
        if: github.ref_name == 'master' && steps.changed_backend.outputs.any_changed == 'true'
        run: pnpm run deploy:stg
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (release)
        if: github.ref_name == 'release' && steps.changed_backend.outputs.any_changed == 'true'
        run: pnpm run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # --- frontend (Cloudflare Workers Static Assets) ---
      - name: Deploy frontend (stg)
        if: github.ref_name == 'master' && steps.changed_frontend.outputs.any_changed == 'true'
        run: pnpm run deploy:fe-stg
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy frontend (release)
        if: github.ref_name == 'release' && steps.changed_frontend.outputs.any_changed == 'true'
        run: pnpm run deploy:fe-prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # --- admin-frontend (Cloudflare Workers Static Assets) ---
      - name: Deploy admin-frontend (stg)
        if: github.ref_name == 'master' && steps.changed_admin_frontend.outputs.any_changed == 'true'
        run: pnpm run deploy:admin-stg
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy admin-frontend (release)
        if: github.ref_name == 'release' && steps.changed_admin_frontend.outputs.any_changed == 'true'
        run: pnpm run deploy:admin-prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
