appId: ${MAESTRO_APP_ID}
---
- runFlow:
    when:
      visible:
        id: tasks.emptyCreate
    commands:
      - tapOn:
          id: tasks.emptyCreate
- runFlow:
    when:
      notVisible:
        id: tasks.create.dialog
    commands:
      # Push the list up so tasks.add isn't behind the tab bar.
      - swipe:
          start: "50%,30%"
          end: "50%,15%"
      - tapOn:
          id: tasks.add
- assertVisible:
    id: tasks.create.dialog
- tapOn:
    id: tasks.create.titleInput
- inputText: ${TASK_TITLE}
- tapOn:
    id: tasks.create.dialog
- tapOn:
    id: tasks.create.submit
- assertVisible: ${TASK_TITLE}
