appId: ${MAESTRO_APP_ID}
---
# Timer гғўгғјгғүиЁҳйҢІ: гӮҝгӮӨгғһгғјгӮҝгғ–гӮ’йҒёжҠһвҶ’startвҶ’stopвҶ’save
- assertVisible: E2EгӮҝгӮӨгғһгғј
- tapOn: E2EгӮҝгӮӨгғһгғј
- assertVisible:
    id: recording.dialog
- tapOn:
    id: recording.timer.tab.timer
- tapOn:
    id: recording.timer.start
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: recording.timer.stop
- tapOn:
    id: recording.timer.save
- extendedWaitUntil:
    visible: Previous day
    timeout: 10000
