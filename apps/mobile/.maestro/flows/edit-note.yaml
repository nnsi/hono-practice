appId: ${MAESTRO_APP_ID}
---
# Open the note from the list
- tapOn: "${NOTE_TITLE}.*"
- assertVisible:
    id: notes.detail.page
# Title is editable inline (no settings panel)
- tapOn:
    id: notes.titleInput
- eraseText: 64
- inputText: ${NOTE_TITLE_UPDATED}
# Auto-save flushes on back navigation
- tapOn:
    id: notes.detail.back
- extendedWaitUntil:
    visible: "${NOTE_TITLE_UPDATED}.*"
    timeout: 10000
