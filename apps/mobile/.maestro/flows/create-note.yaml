appId: ${MAESTRO_APP_ID}
---
- runFlow:
    when:
      visible:
        id: notes.emptyCreate
    commands:
      - tapOn:
          id: notes.emptyCreate
- runFlow:
    when:
      visible:
        id: notes.add
    commands:
      - tapOn:
          id: notes.add
- assertVisible:
    id: notes.settings.panel
- tapOn:
    id: notes.titleInput
- inputText: ${NOTE_TITLE}
- pressKey: Enter
- tapOn:
    id: notes.e2e.fillSample
- tapOn:
    id: notes.save
- extendedWaitUntil:
    visible: "${NOTE_TITLE}.*"
    timeout: 10000
- extendedWaitUntil:
    visible: ".*${NOTE_PREVIEW}.*"
    timeout: 10000
- tapOn: "${NOTE_TITLE}.*"
- assertVisible:
    id: notes.detail.page
- assertVisible:
    id: notes.e2e.preview
- assertVisible: ".*${NOTE_PREVIEW}.*"
