name: e2e-test-ios

on:
  pull_request:
    branches: ["*"]

jobs:
  build_ios_for_e2e:
    environment: preview
    type: build
    params:
      platform: ios
      profile: e2e-test

  maestro_test:
    needs: [build_ios_for_e2e]
    environment: preview
    env:
      MAESTRO_APP_ID: ${{ env.BUNDLE_ID || 'com.actiko.app' }}
    type: maestro
    params:
      build_id: ${{ needs.build_ios_for_e2e.outputs.build_id }}
      flow_path: [".maestro/smoke.yaml"]
